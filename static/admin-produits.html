<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Produits - APHRIKE JULA Admin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .admin-header h1 {
            font-size: 1.8rem;
            color: var(--text-dark);
        }
        .action-bar {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-delete-bulk {
            padding: 0.6rem 1.5rem;
            background: #c62828;
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-delete-bulk:hover { opacity: 0.9; }
        .btn-delete-bulk:disabled { background: #e0e0e0; cursor: not-allowed; }
        
        .prod-table {
            width: 100%;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .prod-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .prod-table th {
            background: #f8f9fa;
            padding: 1rem;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-gray);
            text-transform: uppercase;
        }
        .prod-table td {
            padding: 1rem;
            border-top: 1px solid #f0f0f0;
            vertical-align: middle;
        }
        .prod-table tr:hover td {
            background: #fafafa;
        }
        .prod-image {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #1565C0;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
        .status-msg {
            padding: 0.8rem 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-weight: 600;
            display: none;
        }
        .status-msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
        .status-msg.error { display: block; background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <!-- Navbar APHRIKE JULA -->
    <nav class="aj-navbar" style="display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;background:#1565C0;position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(21,101,192,0.3);">
        <a href="index.html" class="aj-brand" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;">
            <div class="aj-logo">
                <svg width="36" height="36" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="17" cy="17" r="15" fill="rgba(255,255,255,0.1)"/>
                    <polygon points="17,4 20.5,13 30,13 22.5,19 25.5,29 17,23 8.5,29 11.5,19 4,13 13.5,13" fill="rgba(255,215,0,0.25)"/>
                    <polygon points="17,7 20,14.5 28,14.5 21.5,19.5 24,27 17,22.5 10,27 12.5,19.5 6,14.5 14,14.5" fill="#FFD700"/>
                </svg>
            </div>
            <span style="font-size:17px;font-weight:600;color:#fff;letter-spacing:-0.01em;white-space:nowrap;">APHRIKE JULA</span>
        </a>

        <div id="navActions" style="display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;">
            <a href="/dashboard" style="padding:8px 18px;border-radius:100px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:#FFD700;color:#1565C0;text-decoration:none;transition:background 0.2s;">Dashboard</a>
            <a href="index.html" style="padding:7px 16px;border-radius:100px;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.5);text-decoration:none;transition:background 0.2s;">← Retour à l'accueil</a>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <div>
                <a href="/dashboard" class="back-link">← Retour au Dashboard</a>
                <h1 style="margin-top: 10px;">📦 Gestion des Produits (Admin)</h1>
            </div>
        </div>

        <div id="statusMsg" class="status-msg"></div>

        <div class="action-bar">
            <div>
                <span id="selectedCount">0</span> produit(s) sélectionné(s)
            </div>
            <button class="btn-delete-bulk" id="bulkDeleteBtn" disabled onclick="handleBulkDelete()">
                Supprimer la sélection
            </button>
        </div>

        <div class="prod-table">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;">
                            <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
                        </th>
                        <th style="width: 70px;">Image</th>
                        <th>Nom du produit</th>
                        <th>Vendeur (ID)</th>
                        <th>Prix</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="prodTableBody">
                    <tr><td colspan="6" style="text-align:center;padding:2rem;">Chargement des produits...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://web-production-8f94.up.railway.app';
        let allProducts = [];
        let selectedProductIds = new Set();

        // Vérification de sécurité au chargement
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (!token || !userStr) {
                window.location.href = 'connexion.html';
                return;
            }
            
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') {
                document.querySelector('.admin-container').innerHTML = `
                    <div style="text-align:center; padding: 3rem;">
                        <h2>⛔ Accès Refusé</h2>
                        <p>Vous n'avez pas les droits d'administrateur.</p>
                        <a href="index.html" class="back-link">Retourner à l'accueil</a>
                    </div>
                `;
                return;
            }
            
            loadProducts();
        });

        function showStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = 'status-msg ' + (isError ? 'error' : 'success');
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        async function loadProducts() {
            try {
                // Fetch up to 500 recent products for admin moderation
                const res = await fetch(`${API_BASE_URL}/api/produits?limit=500`);
                const data = await res.json();
                
                if (res.ok) {
                    allProducts = data.produits;
                    renderProducts();
                } else {
                    showStatus('Erreur de chargement des produits.', true);
                }
            } catch (error) {
                showStatus('Erreur réseau.', true);
            }
        }

        function renderProducts() {
            const tbody = document.getElementById('prodTableBody');
            if (!allProducts || allProducts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;">Aucun produit trouvé</td></tr>';
                return;
            }
            
            tbody.innerHTML = allProducts.map(p => {
                const img = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/50';
                const date = new Date(p.date_creation).toLocaleDateString('fr-FR');
                return `
                    <tr>
                        <td>
                            <input type="checkbox" class="prod-checkbox" value="${p.id}" onchange="toggleSelect('${p.id}', this.checked)">
                        </td>
                        <td><img src="${img}" class="prod-image"></td>
                        <td style="font-weight:600;">${p.nom}</td>
                        <td style="font-size:0.85rem;color:#666;">${p.vendeur_id || 'N/A'}</td>
                        <td style="font-weight:bold;color:#2e7d32;">${p.prix} FCFA</td>
                        <td style="font-size:0.85rem;">${date}</td>
                    </tr>
                `;
            }).join('');
            
            // Reset selection
            selectedProductIds.clear();
            document.getElementById('selectAll').checked = false;
            updateSelectionCount();
        }

        function toggleSelect(id, isChecked) {
            if (isChecked) {
                selectedProductIds.add(id);
            } else {
                selectedProductIds.delete(id);
                document.getElementById('selectAll').checked = false;
            }
            updateSelectionCount();
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('selectAll').checked;
            const checkboxes = document.querySelectorAll('.prod-checkbox');
            
            checkboxes.forEach(cb => {
                cb.checked = isChecked;
                if (isChecked) {
                    selectedProductIds.add(cb.value);
                } else {
                    selectedProductIds.delete(cb.value);
                }
            });
            updateSelectionCount();
        }

        function updateSelectionCount() {
            const count = selectedProductIds.size;
            document.getElementById('selectedCount').textContent = count;
            document.getElementById('bulkDeleteBtn').disabled = count === 0;
        }

        async function handleBulkDelete() {
            if (selectedProductIds.size === 0) return;
            
            if (!confirm(`Êtes-vous sûr de vouloir supprimer définitivement ces ${selectedProductIds.size} produit(s) ?`)) {
                return;
            }
            
            const btn = document.getElementById('bulkDeleteBtn');
            btn.disabled = true;
            btn.textContent = 'Suppression...';
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/api/admin/produits/bulk`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        product_ids: Array.from(selectedProductIds)
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showStatus(data.message);
                    await loadProducts(); // Recharger la liste
                } else {
                    const data = await response.json();
                    showStatus(data.detail || 'Erreur lors de la suppression', true);
                }
            } catch (error) {
                showStatus('Erreur de réseau.', true);
            } finally {
                btn.disabled = selectedProductIds.size === 0;
                btn.textContent = 'Supprimer la sélection';
            }
        }
    </script>
</body>
</html>
