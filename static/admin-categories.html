<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration Catégories - SANI-FÉRÉ PRO</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --sidebar-width: 280px;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--border-gray);
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-brand {
            margin-bottom: var(--spacing-xl);
        }

        .sidebar-nav {
            list-style: none;
            flex: 1;
        }

        .nav-item {
            margin-bottom: var(--spacing-xs);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            text-decoration: none;
            color: var(--text-gray);
            border-radius: var(--radius-md);
            font-weight: 600;
            transition: var(--transition-fast);
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(0, 176, 116, 0.1);
            color: var(--primary-green);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            background: var(--bg-gray);
        }

        .topbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-gray);
        }

        .content-area {
            padding: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .stat-title {
            color: var(--text-gray);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            margin-top: 2rem;
        }

        .data-table th, .data-table td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-gray);
        }

        .data-table th {
            background: #F8FAFC;
            font-weight: 600;
            color: var(--text-gray);
            font-size: 0.875rem;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            transition: var(--transition-fast);
        }

        .action-btn:hover {
            background: var(--bg-gray);
        }

        .btn-delete { color: #DC2626; }
        .btn-edit { color: var(--primary-green); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-gray);
            border-radius: var(--radius-md);
            font-family: inherit;
        }

    </style>
</head>
<body>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h2 style="color: var(--primary-green);">SANI-FÉRÉ<span style="color: var(--primary-orange);">PRO</span></h2>
                </a>
            </div>

            <ul class="sidebar-nav">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        🏠 Retour Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link active">
                        📁 Gestion Catégories
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2>Administration (Partiel)</h2>
            </header>

            <div class="content-area">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3>Gestion des Catégories</h3>
                    <button class="btn btn-primary" onclick="openModal()">
                        + Ajouter une Catégorie
                    </button>
                </div>

                <div class="stat-card" style="display: inline-block; min-width: 250px;">
                    <div class="stat-title">Total Catégories</div>
                    <div class="stat-value" id="totalCategories">0</div>
                </div>

                <table class="data-table" id="categoriesTable">
                    <thead>
                        <tr>
                            <th>Icone</th>
                            <th>Nom</th>
                            <th>Date de Création</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamique -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Ajouter/Modifier -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom: 1.5rem;">Ajouter une Catégorie</h3>
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label class="form-label">Nom de la catégorie (ex: Alimentation)</label>
                    <input type="text" id="catName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Icone (Emoji, ex: 🍎)</label>
                    <input type="text" id="catIcon" class="form-input" required maxlength="10">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn" style="background: var(--bg-gray);" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCategoriesAdmin();
        });

        async function loadCategoriesAdmin() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/categories`);
                const categories = await response.json();
                
                document.getElementById('totalCategories').textContent = categories.length;
                
                const tbody = document.querySelector('#categoriesTable tbody');
                tbody.innerHTML = '';
                
                categories.forEach(cat => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-size: 1.5rem;">${cat.icone}</td>
                        <td><strong>${cat.nom}</strong></td>
                        <td>${cat.date_creation ? new Date(cat.date_creation).toLocaleDateString('fr-FR') : 'N/A'}</td>
                        <td>
                            <button class="action-btn btn-edit" onclick="editCategory('${cat.id}', '${cat.nom.replace(/'/g, "\\'")}', '${cat.icone}')">✏️ Modifier</button>
                            <button class="action-btn btn-delete" onclick="deleteCategory('${cat.id}')">🗑️ Supprimer</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Erreur chargement catégories:", error);
                alert("Erreur lors du chargement des catégories.");
            }
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = "Ajouter une Catégorie";
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('categoryModal').classList.remove('active');
        }

        function editCategory(id, nom, icone) {
            document.getElementById('modalTitle').textContent = "Modifier la Catégorie";
            document.getElementById('categoryId').value = id;
            document.getElementById('catName').value = nom;
            document.getElementById('catIcon').value = icone;
            document.getElementById('categoryModal').classList.add('active');
        }

        document.getElementById('categoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('categoryId').value;
            const nom = document.getElementById('catName').value.trim();
            const icone = document.getElementById('catIcon').value.trim();

            const url = id ? `${API_BASE_URL}/api/admin/categories/${id}` : `${API_BASE_URL}/api/admin/categories`;
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, icone })
                });

                if (response.ok) {
                    closeModal();
                    loadCategoriesAdmin();
                } else {
                    const err = await response.json();
                    alert("Erreur: " + err.detail);
                }
            } catch (error) {
                console.error(error);
                alert("Erreur réseau");
            }
        });

        async function deleteCategory(id) {
            if (!confirm("Voulez-vous vraiment supprimer cette catégorie ?")) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/categories/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadCategoriesAdmin();
                } else {
                    alert("Erreur lors de la suppression");
                }
            } catch (error) {
                console.error(error);
                alert("Erreur réseau");
            }
        }
    </script>
</body>
</html>
