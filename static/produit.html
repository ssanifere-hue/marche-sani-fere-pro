<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produit - APHRIKE JULA</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }
        
        .product-gallery {
            position: sticky;
            top: calc(80px + var(--spacing-md));
            height: fit-content;
        }
        
        .main-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            margin-bottom: var(--spacing-md);
        }
        
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
        }
        
        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition-fast);
        }

        
        .thumbnail:hover,
        .thumbnail.active {
            border-color: var(--primary-green);
        }
        
        .product-details {
            background: white;
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }
        
        .product-title-large {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }
        
        .product-price-large {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: var(--spacing-md);
        }
        
        .buy-section {
            background: linear-gradient(135deg, #F8F9FA 0%, #E9ECEF 100%);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
        }
        
        .buy-btn {
            width: 100%;
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 1.25rem;
            border-radius: var(--radius-full);
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-fast);
            box-shadow: var(--shadow-md);
            margin-top: var(--spacing-sm);
        }
        
        .buy-btn:hover {
            background: var(--primary-red);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .vendor-card-inline {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-md);
            text-decoration: none;
            color: var(--text-dark);
            transition: var(--transition-fast);
        }
        
        .vendor-card-inline:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .product-page {
                grid-template-columns: 1fr;
            }
            
            .product-gallery {
                position: static;
            }
        }
    </style>
</head>
<body>
    <nav class="aj-navbar" style="display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;background:#1565C0;position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(21,101,192,0.3);">
        <a href="index.html" class="aj-brand" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;">
            <div class="aj-logo">
                <svg width="36" height="36" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="17" cy="17" r="15" fill="rgba(255,255,255,0.1)"/>
                    <polygon points="17,4 20.5,13 30,13 22.5,19 25.5,29 17,23 8.5,29 11.5,19 4,13 13.5,13" fill="rgba(255,215,0,0.25)"/>
                    <polygon points="17,7 20,14.5 28,14.5 21.5,19.5 24,27 17,22.5 10,27 12.5,19.5 6,14.5 14,14.5" fill="#FFD700"/>
                </svg>
            </div>
            <span style="font-size:17px;font-weight:600;color:#fff;letter-spacing:-0.01em;white-space:nowrap;">APHRIKE JULA</span>
        </a>

        <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);border-radius:100px;padding:7px 16px;flex:1;max-width:420px;margin:0 auto;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Chercher..." style="background:transparent;border:none;outline:none;font-size:14px;color:#fff;width:100%;">
        </div>

        <div id="navActions" style="display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;">
            <a href="vendre.html" style="padding:8px 18px;border-radius:100px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:#FFD700;color:#1565C0;text-decoration:none;transition:background 0.2s;">Vendre</a>
            <a href="connexion.html" style="padding:7px 16px;border-radius:100px;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.5);text-decoration:none;transition:background 0.2s;">Connexion</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem;">
        <div class="product-page" id="productPage">
            <div class="loading" style="grid-column: 1/-1;">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 APHRIKE JULA. Tous droits réservés. 🇲🇱</p>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE_URL = 'https://web-production-8f94.up.railway.app';
        let productId = null;
        let productData = null;
        let currentImageIndex = 0;

        document.addEventListener('DOMContentLoaded', () => {
            updateNavbar();
            
            const params = new URLSearchParams(window.location.search);
            productId = params.get('id');
            
            if (!productId) {
                window.location.href = 'index.html';
                return;
            }
            
            loadProduct();
        });

        // Session navbar (même logique que app.js)
        function updateNavbar() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            const navActions = document.getElementById('navActions');
            if (token && userStr && navActions) {
                try {
                    const user = JSON.parse(userStr);
                    const firstName = user.prenom || user.nom || 'Compte';
                    navActions.innerHTML = `
                        ${user.role === 'vendeur'
                            ? '<a href="/dashboard" class="nav-btn primary">Dashboard</a>'
                            : '<a href="vendre.html" class="nav-btn primary">Vendre</a>'}
                        <div style="display:flex;align-items:center;gap:1rem;">
                            <span style="font-weight:600;color:var(--text-dark);">👤 ${firstName}</span>
                            <a href="#" class="nav-btn" onclick="handleLogout(event)">Déconnexion</a>
                        </div>
                    `;
                } catch(e) {}
            }
        }
        function handleLogout(e) {
            if(e) e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        async function loadProduct() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/produits/${productId}`);
                
                if (!response.ok) throw new Error('Produit non trouvé');
                
                const data = await response.json();
                
                // L'API renvoie les champs directement (pas dans data.produit)
                if (!data.id && !data.nom) throw new Error('Produit non trouvé');
                
                productData = data;
                displayProduct(productData);
                
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('productPage').innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; padding:3rem;">
                        <h3>❌ Produit non trouvé</h3>
                        <a href="index.html" class="nav-btn primary">Retour à l'accueil</a>
                    </div>
                `;
            }
        }

        function displayProduct(product) {
            // Compatibilité: backend renvoie 'nom', frontend utilisait 'titre'
            const productName = product.nom || product.titre || 'Produit';
            const vendorName = (product.vendeur && product.vendeur.nom_boutique) || product.vendeur_nom || 'Vendeur';
            const vendorId = (product.vendeur && product.vendeur.id) || product.vendeur_id || '';
            
            const images = product.images && product.images.length > 0 
                ? product.images 
                : ['https://via.placeholder.com/600x600/E9ECEF/6C757D?text=Produit'];
            
            const thumbnails = images.map((img, i) => 
                `<img src="${img}" class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeImage(${i})" onerror="this.src='https://via.placeholder.com/80x80/E9ECEF/6C757D?text=IMG'">`
            ).join('');
            
            const isPremium = product.est_premium || product.vendeur_premium || false;
            
            const html = `
                <div class="product-gallery">
                    <img src="${images[0]}" id="mainImage" class="main-image" alt="${productName}" onerror="this.src='https://via.placeholder.com/600x600/E9ECEF/6C757D?text=Image'">
                    ${images.length > 1 ? `<div class="thumbnail-grid">${thumbnails}</div>` : ''}
                </div>

                
                <div class="product-details">
                    <h1 class="product-title-large">${productName}</h1>
                    <div class="product-price-large">${formatPrice(product.prix)} FCFA</div>
                    
                    <div class="buy-section">
                        <p style="margin-bottom: 0.5rem; font-weight: 600;">💳 Paiement sécurisé Orange Money</p>
                        <button class="buy-btn" onclick="acheterProduit()">
                            🛒 Acheter Maintenant
                        </button>
                    </div>
                    
                    <a href="vendeur.html?id=${vendorId}" class="vendor-card-inline">
                        <div class="vendor-avatar" style="width: 60px; height: 60px; font-size: 1.5rem;">
                            ${vendorName.charAt(0).toUpperCase()}
                        </div>
                        <div style="flex: 1;">
                            <div style="font-weight: 700; margin-bottom: 0.25rem;">
                                ${vendorName} ${isPremium ? '<span style="color: var(--premium-gold);">✓</span>' : ''}
                            </div>
                            <div style="font-size: 0.9rem; color: var(--text-gray);">
                                Voir la boutique →
                            </div>
                        </div>
                    </a>
                    
                    <div style="margin-bottom: var(--spacing-md);">
                        <h3 style="margin-bottom: 0.5rem;">📝 Description</h3>
                        <p style="color: var(--text-gray); line-height: 1.8;">
                            ${product.description || 'Pas de description disponible.'}
                        </p>
                    </div>
                    
                    <div>
                        <h3 style="margin-bottom: 0.5rem;">ℹ️ Informations</h3>
                        <div style="display: grid; gap: 0.5rem;">
                            <div><strong>Catégorie:</strong> ${product.categorie || 'Non classé'}</div>
                            <div><strong>État:</strong> ${product.etat || 'Neuf'}</div>
                            <div><strong>Localisation:</strong> ${product.localisation || 'Mali'}</div>
                            <div><strong>Publié le:</strong> ${formatDate(product.date_creation)}</div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('productPage').innerHTML = html;
            document.title = `${productName} - APHRIKE JULA`;
        }

        function changeImage(index) {
            currentImageIndex = index;
            const images = productData.images || [];
            document.getElementById('mainImage').src = images[index];
            
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        }

        function acheterProduit() {
            alert('🚧 Fonctionnalité en développement\\n\\nBientôt : Paiement sécurisé Orange Money !');
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('fr-FR').format(price);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        }
    </script>
</body>
</html>
