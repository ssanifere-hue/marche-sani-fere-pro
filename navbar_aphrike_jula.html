<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APHRIKE JULA — Navbar</title>
  <style>
    /* ══════════════════════════════════════════
       APHRIKE JULA — Navbar Bleu Roi & Or
       À intégrer dans main.py / templates HTML
    ══════════════════════════════════════════ */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
    }

    /* ── Navbar principale ── */
    .aj-navbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      height: 56px;
      background: #1565C0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(21, 101, 192, 0.3);
    }

    /* ── Logo + Nom ── */
    .aj-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .aj-logo svg {
      display: block;
    }

    .aj-name {
      font-size: 17px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    /* ── Barre de recherche ── */
    .aj-search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 100px;
      padding: 7px 16px;
      flex: 1;
      max-width: 420px;
      margin: 0 auto;
      transition: background 0.2s;
    }

    .aj-search:focus-within {
      background: rgba(255, 255, 255, 0.25);
    }

    .aj-search-icon {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      flex-shrink: 0;
    }

    .aj-search input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: #ffffff;
      width: 100%;
    }

    .aj-search input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    /* ── Boutons ── */
    .aj-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .aj-btn-sell {
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: #FFD700;
      color: #1565C0;
      transition: background 0.2s, transform 0.1s;
    }

    .aj-btn-sell:hover {
      background: #FFC200;
      transform: scale(1.02);
    }

    .aj-btn-login {
      padding: 7px 16px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: #ffffff;
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      transition: background 0.2s;
    }

    .aj-btn-login:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Responsive mobile ── */
    @media (max-width: 600px) {
      .aj-navbar { padding: 0 14px; gap: 8px; }
      .aj-name { font-size: 15px; }
      .aj-search { max-width: 100%; }
      .aj-btn-login { display: none; }
      .aj-btn-sell { padding: 7px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     NAVBAR APHRIKE JULA — Coller ce bloc dans
     le template HTML de l'application
══════════════════════════════════════════ -->
<nav class="aj-navbar">

  <!-- Logo + Nom -->
  <a href="/" class="aj-brand">
    <div class="aj-logo">
      <svg width="36" height="36" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="15" fill="rgba(255,255,255,0.1)"/>
        <polygon points="17,4 20.5,13 30,13 22.5,19 25.5,29 17,23 8.5,29 11.5,19 4,13 13.5,13"
                 fill="rgba(255,215,0,0.25)"/>
        <polygon points="17,7 20,14.5 28,14.5 21.5,19.5 24,27 17,22.5 10,27 12.5,19.5 6,14.5 14,14.5"
                 fill="#FFD700"/>
      </svg>
    </div>
    <span class="aj-name">APHRIKE JULA</span>
  </a>

  <!-- Recherche -->
  <div class="aj-search">
    <svg class="aj-search-icon" width="16" height="16" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Chercher un produit, un vendeur..."/>
  </div>

  <!-- Actions -->
  <div class="aj-actions">
    <button class="aj-btn-sell">Vendre</button>
    <button class="aj-btn-login">Connexion</button>
  </div>

</nav>
<!-- ══ FIN NAVBAR ══ -->

</body>
</html>
